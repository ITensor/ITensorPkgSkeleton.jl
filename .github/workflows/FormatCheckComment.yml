name: "Format Check Comment"
on:
  workflow_run:
    workflows:
      - "Format Check"
    types:
      - "completed"
permissions:
  pull-requests: "write"
  actions: "read"
jobs:
  comment:
    name: "Format Check Comment"
    if: "github.event.workflow_run.event == 'pull_request'"
    uses: "ITensor/ITensorActions/.github/workflows/FormatCheckComment.yml@v1"
    secrets: "inherit"
